<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clean Text - Remove Citations</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .description {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .input-section, .output-section {
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.5;
            resize: vertical;
        }

        textarea:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
        }

        #output {
            background-color: #e8f5e9;
        }

        .button-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-primary {
            background-color: #007bff;
            color: white;
        }

        .btn-primary:hover {
            background-color: #0056b3;
        }

        .btn-secondary {
            background-color: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background-color: #545b62;
        }

        .btn-success {
            background-color: #28a745;
            color: white;
        }

        .btn-success:hover {
            background-color: #1e7e34;
        }
    </style>
</head>
<body>
    <h1>Clean Text</h1>
    <p class="description">Paste text with citations and get a cleaned version. Removes bracketed citations like [1] and also footnote-style trailing numbers like “... text 6,7 8”. Also converts the “” bullet character into “-”.</p>

    <div class="input-section">
        <label for="input">Input (paste text with citations):</label>
        <textarea id="input" placeholder="Paste your text here..."></textarea>
    </div>

    <div class="button-row">
        <button class="btn-primary" onclick="cleanText()">Clean Text</button>
        <button class="btn-secondary" onclick="clearAll()">Clear All</button>
        <button class="btn-success" onclick="copyOutput()">Copy Output</button>
    </div>

    <div class="output-section">
        <label for="output">Cleaned Output:</label>
        <textarea id="output" readonly placeholder="Cleaned text will appear here..."></textarea>
    </div>

    <script>
        function cleanText() {
            const input = document.getElementById('input').value;

            // 0) Normalize the common bullet char from copy/paste into a normal dash bullet.
            // (The input often contains U+2022/variants; in your sample it’s U+2022-like "".)
            let cleaned = input.replace(//g, '-');

            // 1) Remove HTML anchor tags containing bracketed numbers (with optional trailing comma)
            cleaned = cleaned.replace(/<a[^>]*>\s*\[\d+(?:,\s*\d+)*\]\s*<\/a>\s*,?/gi, '');

            // 2) Remove standalone bracketed numbers with optional trailing comma (like "[1]," or "[1,2],")
            cleaned = cleaned.replace(/\s*\[\d+(?:,\s*\d+)*\]\s*,?/g, '');

            // 3) Remove footnote-style citation numbers that appear as trailing tokens at end-of-line/paragraph
            // Examples we want to remove:
            //   "... plan includes ... 1 - Underwent ..."
            //   "... addressed ... 6,7 8"
            //   "... observed. 9,10,11"
            // Heuristic: remove 1–3 digit number clusters (optionally comma-separated, optionally multiple groups)
            // when followed by a dash bullet, newline, or end-of-text. Avoid 4-digit years.
            cleaned = cleaned.replace(/\s+(?:(?:[1-9]\d{0,2})(?:\s*,\s*(?:[1-9]\d{0,2}))*)(?:\s+(?:[1-9]\d{0,2})(?:\s*,\s*(?:[1-9]\d{0,2}))*)*\s*(?=(?:-\s)|\n|$)/g, ' ');

            // 4) Clean up any leftover commas (one or more) before periods or other punctuation
            cleaned = cleaned.replace(/(?:,\s*)+([.;:!?])/g, '$1');

            // 5) Ensure bullet lines start on their own line
            // Example: "... adjustment. 1 - Underwent ..." -> "... adjustment.\n- Underwent ..."
            cleaned = cleaned.replace(/(\S)[ \t]+-\s+/g, '$1\n- ');

            // 6) Clean up double spaces (preserve newlines)
            cleaned = cleaned.replace(/[ \t]{2,}/g, ' ');

            // 7) Clean up space before punctuation (preserve newlines)
            cleaned = cleaned.replace(/[ \t]+([.;:,!?])/g, '$1');

            document.getElementById('output').value = cleaned.trim();
        }

        function clearAll() {
            document.getElementById('input').value = '';
            document.getElementById('output').value = '';
        }

        function copyOutput() {
            const output = document.getElementById('output');
            output.select();
            document.execCommand('copy');

            // Brief visual feedback
            const btn = event.target;
            const originalText = btn.textContent;
            btn.textContent = 'Copied!';
            setTimeout(() => {
                btn.textContent = originalText;
            }, 1500);
        }

        // Auto-clean on input
        document.getElementById('input').addEventListener('input', cleanText);
    </script>
</body>
</html>
